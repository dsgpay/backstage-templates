name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr create-repository \
            --repository-name ${{ values.ecrImageName }} \
            --region ${{ vars.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            || true

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ values.ecrImageName }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ values.ecrImageName }}:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/${{ values.ecrImageName }}:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Checkout prod-gitops
        uses: actions/checkout@v4
        with:
          repository: dsgpay/prod-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: prod-gitops

      - name: Update image tag in deployment.yaml
        run: |
          cd prod-gitops
          sed -i "s|image: .*${{ values.ecrImageName }}:.*|image: $IMAGE|" \
            ${{ values.gitopsDeploymentPath }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-${{ values.serviceName }}-${{ github.sha }}
          git add ${{ values.gitopsDeploymentPath }}
          git commit -m "chore: update ${{ values.serviceName }} to ${{ github.sha }}"
          git push origin update-${{ values.serviceName }}-${{ github.sha }}

      - name: Open PR on prod-gitops
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          gh pr create \
            --repo dsgpay/prod-gitops \
            --title "chore: update ${{ values.serviceName }} to ${{ github.sha }}" \
            --body "Automated image update from ${{ github.repository }}@${{ github.sha }}" \
            --base main \
            --head update-${{ values.serviceName }}-${{ github.sha }}
