apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ${{ values.serviceName }}
  name: ${{ values.serviceName }}
  namespace: default
spec:
  selector:
    matchLabels:
      app: ${{ values.serviceName }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ${{ values.serviceName }}
    spec:
      containers:
        - name: ${{ values.serviceName }}
          image: 589962364545.dkr.ecr.ap-southeast-1.amazonaws.com/${{ values.ecrImageName }}:latest
          ports:
            - containerPort: ${{ values.port }}
          resources:
            requests:
              cpu: "{% if values.resourceSize == 'large' %}400m{% elif values.resourceSize == 'medium' %}200m{% else %}50m{% endif %}"
              memory: "{% if values.resourceSize == 'large' %}800Mi{% elif values.resourceSize == 'medium' %}400Mi{% else %}100Mi{% endif %}"
            limits:
              cpu: "{% if values.resourceSize == 'large' %}800m{% elif values.resourceSize == 'medium' %}400m{% else %}150m{% endif %}"
              memory: "{% if values.resourceSize == 'large' %}1024Mi{% elif values.resourceSize == 'medium' %}800Mi{% else %}300Mi{% endif %}"
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      nodeSelector:
        karpenter.sh/capacity-type: spot
