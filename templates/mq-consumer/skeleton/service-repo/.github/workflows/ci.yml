name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: 589962364545.dkr.ecr.ap-southeast-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ values.ecrImageName }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ values.ecrImageName }}:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update image tag in prod-gitops
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://x-access-token:$GITOPS_TOKEN@github.com/dsgpay/prod-gitops.git /tmp/prod-gitops
          cd /tmp/prod-gitops
          git config user.email "ci@dsgpay.com"
          git config user.name "CI Bot"
          NEW_IMAGE="589962364545.dkr.ecr.ap-southeast-1.amazonaws.com/${{ values.ecrImageName }}:$IMAGE_TAG"
          sed -i "s|image: 589962364545.dkr.ecr.ap-southeast-1.amazonaws.com/${{ values.ecrImageName }}:.*|image: $NEW_IMAGE|" \
            ${{ values.gitopsDeploymentPath }}
          git add ${{ values.gitopsDeploymentPath }}
          git commit -m "chore: update ${{ values.serviceName }} to $IMAGE_TAG"
          git push
