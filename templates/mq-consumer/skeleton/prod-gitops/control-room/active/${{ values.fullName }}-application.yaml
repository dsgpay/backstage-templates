apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.fullName }}
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: prod-dsg/dsg-api/standalone/mq/${{ values.vhost }}/${{ values.fullName }}
    repoURL: https://github.com/dsgpay/prod-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
