apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mq-consumer
  title: RabbitMQ Consumer
  description: Service that consumes from a RabbitMQ queue with dead-letter retry pattern. Creates GitHub repo and opens PR on prod-gitops.
  tags:
    - rabbitmq
    - consumer
spec:
  owner: group:default/it
  type: service

  parameters:
    - title: Service Details
      required: [serviceName, queueName, vhost, description, ecrImageName, owner]
      properties:
        serviceName:
          title: Service Name (short)
          type: string
          description: "e.g. blacklist → full name becomes mq-collections-blacklist"
          pattern: "^[a-z][a-z0-9-]*$"
        queueName:
          title: Queue Name
          type: string
          description: "Short queue name e.g. blacklist"
        vhost:
          title: RabbitMQ Vhost
          type: string
          enum: [collections, stp]
          enumNames:
            - "collections (payment collection flows)"
            - "stp (straight-through processing)"
        description:
          title: Description
          type: string
        ecrImageName:
          title: ECR Image Name
          type: string
          description: "e.g. dsgpay/mq-blacklist"
        owner:
          title: Owner
          type: string
          default: "group:default/it"

  steps:
    - id: fetchServiceRepo
      name: Scaffold service repo files
      action: fetch:template
      input:
        url: ./skeleton/service-repo
        values:
          serviceName: mq-${{ parameters.vhost }}-${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          ecrImageName: ${{ parameters.ecrImageName }}
          owner: ${{ parameters.owner }}
          gitopsDeploymentPath: "prod-dsg/dsg-api/standalone/mq/${{ parameters.vhost }}/mq-${{ parameters.vhost }}-${{ parameters.serviceName }}/mq-${{ parameters.vhost }}-${{ parameters.serviceName }}-deployment.yaml"

    - id: publishServiceRepo
      name: Create service GitHub repo
      action: publish:github
      input:
        repoUrl: "github.com?owner=dsgpay&repo=mq-${{ parameters.vhost }}-${{ parameters.serviceName }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: private

    - id: fetchGitops
      name: Scaffold prod-gitops manifests
      action: fetch:template
      input:
        url: ./skeleton/prod-gitops
        targetPath: prod-gitops
        values:
          serviceName: ${{ parameters.serviceName }}
          vhost: ${{ parameters.vhost }}
          fullName: mq-${{ parameters.vhost }}-${{ parameters.serviceName }}
          queueName: ${{ parameters.queueName }}
          ecrImageName: ${{ parameters.ecrImageName }}

    - id: prGitops
      name: Open PR on prod-gitops
      action: publish:github:pull-request
      input:
        repoUrl: "github.com?owner=dsgpay&repo=prod-gitops"
        title: "feat: add mq-${{ parameters.vhost }}-${{ parameters.serviceName }} consumer"
        branchName: "feat/add-mq-${{ parameters.vhost }}-${{ parameters.serviceName }}"
        description: |
          New RabbitMQ consumer: mq-${{ parameters.vhost }}-${{ parameters.serviceName }}
          Queue: ${{ parameters.queueName }} on vhost ${{ parameters.vhost }}
          Owner: ${{ parameters.owner }}
          Scaffolded from Backstage mq-consumer template.
        sourcePath: prod-gitops
        targetPath: "."

    - id: registerCatalog
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publishServiceRepo.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Service Repository
        url: ${{ steps.publishServiceRepo.output.remoteUrl }}
      - title: prod-gitops PR
        url: ${{ steps.prGitops.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.registerCatalog.output.entityRef }}
